name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run build

      - run: npm run lint

      - run: npm test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run build

      - uses: actions/cache@v5
        with:
          path: .obsidian-cache
          key: obsidian-${{ runner.os }}

      - name: E2E smoke test
        run: xvfb-run npx wdio run wdio.conf.mts --spec test/e2e/specs/smoke.e2e.ts
